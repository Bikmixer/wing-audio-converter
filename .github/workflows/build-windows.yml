name: Build Wing Converter for All Platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download FFmpeg
      run: |
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "."
        $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
        Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" -Destination "ffmpeg.exe"
    
    - name: Build executable
      run: |
        pyinstaller --name "Wing Converter Pro" --windowed --add-data "gui_interface.html;." --add-binary "ffmpeg.exe;bin" gui_web_crossplatform.py
    
    - name: Create distribution package
      run: |
        mkdir "Wing Converter Pro Windows"
        Copy-Item -Recurse "dist\Wing Converter Pro" "Wing Converter Pro Windows\"
        Compress-Archive -Path "Wing Converter Pro Windows" -DestinationPath "Wing-Converter-Pro-Windows.zip"
    
    - name: Upload Windows build
      uses: actions/upload-artifact@v4
      with:
        name: wing-converter-windows
        path: Wing-Converter-Pro-Windows.zip
  
  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build app bundle
      run: |
        pyinstaller --name "Wing Converter Pro" \
          --windowed \
          --add-data "gui_interface.html:." \
          --bundle-identifier "com.wingconverter.pro" \
          gui_web_crossplatform.py
    
    - name: Create distribution package
      run: |
        mkdir "Wing Converter Pro macOS"
        cp -R "dist/Wing Converter Pro.app" "Wing Converter Pro macOS/"
        echo "Note: FFmpeg must be installed separately via: brew install ffmpeg" > "Wing Converter Pro macOS/README.txt"
        zip -r -q "Wing-Converter-Pro-macOS.zip" "Wing Converter Pro macOS"
    
    - name: Upload macOS build
      uses: actions/upload-artifact@v4
      with:
        name: wing-converter-macos
        path: Wing-Converter-Pro-macOS.zip
  
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg zenity
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build executable
      run: |
        pyinstaller --name "wing-converter-pro" \
          --add-data "gui_interface.html:." \
          --add-binary "/usr/bin/ffmpeg:bin" \
          gui_web_crossplatform.py
    
    - name: Create distribution package
      run: |
        mkdir "Wing Converter Pro Linux"
        cp -R "dist/wing-converter-pro" "Wing Converter Pro Linux/"
        tar -czf "Wing-Converter-Pro-Linux.tar.gz" "Wing Converter Pro Linux"
    
    - name: Upload Linux build
      uses: actions/upload-artifact@v4
      with:
        name: wing-converter-linux
        path: Wing-Converter-Pro-Linux.tar.gz

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Display structure
      run: ls -R
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          wing-converter-windows/*.zip
          wing-converter-macos/*.zip
          wing-converter-linux/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
